# GLOBAL OPTIONS

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set-option -g allow-rename off
set-option -g base-index 1
set-option -g pane-base-index 1
set -g renumber-window on
set-window-option -g automatic-rename on
set-option -g set-titles on
set -g status-keys vi
set -g history-limit 10000
setw -g mode-keys vi
setw -g mouse on
setw -g monitor-activity on
set -sg escape-time 0
set-option -g detach-on-destroy off
set-option -g display-time 1000
set-option -g pane-scrollbars modal
set -g default-shell /usr/bin/zsh

# Enable true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# KEYBINDINGS

# rebind prefix as C-s
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# source config to refresh tmux's configuration
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# create new window at current path
unbind c
bind c new-window -c "#{pane_current_path}"

# split windows with v (vertical) or s (horizontal)
bind v split-window -h -c "#{pane_current_path}"
unbind s
bind s split-window -v -c "#{pane_current_path}"

# change layout to V (vertical) or H (horizontal)
bind V select-layout even-horizontal
bind H select-layout even-vertical

# ALT-vim keys to switch windows
bind -n M-h previous-window
bind -n M-l next-window

# CTRL-ALT-vim keys to switch zoomed pane
bind-key -n C-M-l select-pane -Z -R
bind-key -n C-M-h select-pane -Z -L
bind-key -n C-M-k select-pane -Z -U
bind-key -n C-M-j select-pane -Z -D

# move window to specific position
unbind .
bind . command-prompt -p "Move window to:" { swap-window -t '%%' ; select-window -t '%%' ; move-window -r }

# for copy mode
bind-key \; copy-mode # enter copy mode
bind-key -Tcopy-mode-vi v send -X begin-selection # visual mode in copy mode
bind-key -Tcopy-mode-vi V send -X select-line # visual-line mode in copy mode
bind-key -Tcopy-mode-vi y send -X copy-selection # yank in copy mode
bind-key -Tcopy-mode-vi r send -X rectangle-toggle # visual block toggle

# # to resize simply with arrow keys
bind -n -r M-H  resize-pane -L 5
bind -n -r M-L resize-pane -R 5
bind -n -r M-K    resize-pane -U 5
bind -n -r M-J  resize-pane -D 5

# bind t to create new session
unbind t
bind t command-prompt -p "New session name:" "new-session -c '#{pane_current_path}' -s '%%'"

# kill pane without confirmation
unbind x
bind x kill-pane

# kill all other panes
unbind o
bind o kill-pane -a

# kill all other windows
unbind w
bind w confirm-before -p "Kill all other windows? (y/n)" "kill-window -a"

# kill session with k
bind k confirm-before -p "kill session? (y/n)" kill-session

# kill server with K (Shift-k)
bind K confirm-before -p "kill tmux server? (y/n)" kill-server

# opencode
bind O split-window -h -c "#{pane_current_path}" "opencode"

# lazygit
bind -n C-g display-popup -E -xC -yC -w 85% -h 85% -d "#{pane_current_path}" lazygit

# THEME

# Status bar general style
set-window-option -g status-position top
set -g status-style "bg=#131a24,fg=#aeafb0"
set -g status-position top
set -g status-interval 1

# Window (Tab) style - Inactive
set-window-option -g window-status-style "bg=#131a24,fg=#aeafb0"
set-window-option -g window-status-format " #[fg=#aeafb0]#{window_index}:#{window_name}#{?window_zoomed_flag,  ,} "

# Window (Tab) style - Active
set-window-option -g window-status-current-style "bg=#192330,fg=#dbc074,bold"
set-window-option -g window-status-current-format " #[fg=#dbc074]#{window_index}:#{window_name}#{?window_zoomed_flag,  ,} "

# Status Left - Empty or Session Name
set -g status-left-length 30
set -g status-left ""

# Status Right - Workspace name and Mode Indicators
# Matches your WezTerm: [Icon] [Workspace Name]
set -g status-right-length 150
set -g status-right "#[fg=#63cdcf,bg=#131a24] #S #{tmux_mode_indicator}"

# Popup styling
set -g popup-border-lines heavy
set -g popup-border-style fg=#39506d

# --- PLUGIN CONFIGURATION ---

set -g window-status-format "#{window_index}:#{window_name}#{?window_zoomed_flag, ,}"

set -g visual-bell off
setw -g monitor-activity off
set -g status-interval 1
set -g status-left-length 30

# PLUGINS

# List of plugins
set -g @plugin 'tmux-plugins/tpm-redux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'christoomey/vim-tmux-navigator'

# configuration for tmux-resurrect
set -g @resurrect-strategy-nvim 'session'
resurrect_dir="$HOME/.local/share/tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~nvim" "~R" "~python3" "~julia"'

# change key for tmux-suspend
set -g @suspend_key 'F10'

# tmux-mode-indicator configuration
set -g @mode_indicator_empty_prompt " "
set -g @mode_indicator_empty_mode_style "bg=#131a24"
set -g @mode_indicator_prefix_prompt " 󱐋 "
set -g @mode_indicator_prefix_mode_style "bg=#131a24,fg=#dbc074"
set -g @mode_indicator_copy_prompt " 󰆏 "
set -g @mode_indicator_copy_mode_style "bg=#131a24,fg=#f29e74"
set -g @suspend_suspended_options " \
  @mode_indicator_custom_prompt:: suspended , \
  @mode_indicator_custom_mode_style::bg=#131a24\\,fg=#39506d\\,bold, \
"

# for vim-tmux-navigator disable C-l = clear screen
set -g @vim_navigator_prefix_mapping_clear_screen ""
bind -n M-x send-keys C-l

# Initialize TMUX plugin manager
run '$HOME/.config/tmux/plugins/tpm-redux/tpm'

# CUSTOM RESURRECT

# unbind tmux-resurrect's default resurrect functionality
unbind C-r
unbind C-s
unbind l

# Your custom session management bindings
# Kill session via fzf
bind-key X display-popup -E "$HOME/.config/tmux/tmux-session-manager/kill-session"
# Save current session by name
bind-key S confirm-before -p "Save session #{session_name}? (y/n)" "run-shell '$HOME/.config/tmux/tmux-session-manager/save-session #{session_name}'"
# Load session via fzf
bind-key l display-popup -E "$HOME/.config/tmux/tmux-session-manager/restore-session"
# select session with fzf
bind-key g display-popup -E "$HOME/.config/tmux/tmux-session-manager/jump-session"
